name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev deps (no UI deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type check (mypy)
        run: mypy src/ || echo "::warning::mypy issues — non-blocking until v0.1"
        continue-on-error: true

      - name: Generate JSON schema (smoke)
        run: python -m pem_ec_designer.schema.cli

      - name: Run tests
        run: pytest -v --tb=short

  schema-drift:
    name: Schema-Drift Check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Regenerate library/schema.json
        run: python -m pem_ec_designer.schema.cli

      - name: Fail if schema.json drifted
        run: |
          if ! git diff --exit-code library/schema.json; then
            echo "::error::library/schema.json is out of sync with Pydantic models."
            echo "Run 'python -m pem_ec_designer.schema.cli' locally and commit the result."
            exit 1
          fi
